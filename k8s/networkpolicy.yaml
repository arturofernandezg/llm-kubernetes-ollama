# =============================================================================
# NetworkPolicy — Segmentación de tráfico entre pods y namespaces
#
# Namespaces del proyecto:
#   arturo-llm-test   → agent, ollama, chromadb
#   arturo-monitoring → Prometheus, Alertmanager (kube-prometheus-stack)
#   arturo-mattermost → Mattermost, PostgreSQL
#
# Tráfico permitido (cross-namespace usa FQDN + namespaceSelector):
#   ollama          ← agent               (11434)
#   agent           ← apache              (8000, tests)
#   agent           ← alertmanager        (8000, webhook)
#   chromadb        ← agent               (8000)
#   mattermost      ← agent               (8065, cross-namespace)
#   postgres        ← mattermost          (5432, mismo namespace)
#
# NOTA: Requiere NetworkPolicy habilitado en el cluster.
# Verificar:
#   gcloud container clusters describe ai-infra-agent \
#     --zone europe-southwest1-a \
#     --format="value(networkPolicy, networkConfig.datapathProvider)"
#
# Antes de aplicar, eliminar la política antigua si existe:
#   kubectl delete networkpolicy agent-allow-apache-only -n arturo-llm-test
# =============================================================================

# ── Namespace: arturo-llm-test ────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-allow-agent-only
  namespace: arturo-llm-test
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: agent
      ports:
        - protocol: TCP
          port: 11434

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-allow-ingress
  namespace: arturo-llm-test
spec:
  podSelector:
    matchLabels:
      app: agent
  policyTypes:
    - Ingress
  ingress:
    # Apache (tests de red y validación manual — mismo namespace)
    - from:
        - podSelector:
            matchLabels:
              app: apache
      ports:
        - protocol: TCP
          port: 8000
    # Alertmanager standalone (namespace: arturo-monitoring)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: arturo-monitoring
          podSelector:
            matchLabels:
              app: alertmanager
      ports:
        - protocol: TCP
          port: 8000

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chromadb-allow-agent-only
  namespace: arturo-llm-test
spec:
  podSelector:
    matchLabels:
      app: chromadb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: agent
      ports:
        - protocol: TCP
          port: 8000

---

# ── Namespace: arturo-mattermost ──────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mattermost-allow-agent-only
  namespace: arturo-mattermost
spec:
  podSelector:
    matchLabels:
      app: mattermost
  policyTypes:
    - Ingress
  ingress:
    # El agente (namespace: arturo-llm-test) envía notificaciones via webhook
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: arturo-llm-test
          podSelector:
            matchLabels:
              app: agent
      ports:
        - protocol: TCP
          port: 8065

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-mattermost-only
  namespace: arturo-mattermost
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    # Solo Mattermost puede acceder a PostgreSQL (mismo namespace)
    - from:
        - podSelector:
            matchLabels:
              app: mattermost
      ports:
        - protocol: TCP
          port: 5432
