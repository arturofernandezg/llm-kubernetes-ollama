apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: arturo-llm-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      containers:
      - name: agent
        # En producción, sustituir :latest por el SHA del commit:
        #   image: ...aiops-agent:$COMMIT_SHA
        image: europe-southwest1-docker.pkg.dev/uniovi-ai-infra-agent/aiops-agent/aiops-agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "384Mi"
            cpu: "300m"
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        # Liveness: solo comprueba que el proceso responde.
        # Si falla → Kubernetes reinicia el pod.
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        # Readiness: comprueba Ollama + modelo disponible.
        # Si falla → Kubernetes deja de enrutar tráfico (sin reiniciar).
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        env:
        - name: OLLAMA_URL
          value: "http://ollama-svc:11434/api/generate"
        - name: OLLAMA_TAGS
          value: "http://ollama-svc:11434/api/tags"
        - name: OLLAMA_MODEL
          value: "qwen2.5:1.5b"
      volumes:
      - name: tmp
        emptyDir: {}
